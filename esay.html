.header-title { font-size:28px; font-weight:900; font-family:'Saira Condensed',sans-serif; letter-spacing:1px; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,0.15); position:relative; }

.mode-btn.active { border-color:#534AB7; background:#EEEDFE; color:#534AB7; box-shadow:0 2px 8px rgba(83,74,183,0.2); }

.kat-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.kat-chip {

  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
.kat-chip:hover { transform:translateY(-1px); }

.start-btn {
  background:linear-gradient(135deg, #534AB7, #7F77DD); color:#fff;
  border:none; border-radius:14px; padding:15px 0; font-size:16px;

  transition:transform 0.15s, box-shadow 0.15s;

}
.start-btn:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(83,74,183,0.45); }

.quiz-wrap { max-width:520px; margin:0 auto; padding:0 16px 30px; display:none; }

.prog-area { padding:14px 0 8px; }
.prog-meta { display:flex; justify-content:space-between; font-size:12px; color:#AA8870; margin-bottom:7px; font-family:'Saira Condensed',sans-serif; font-weight:700; }

.prog-bg { height:8px; background:#F0E0D0; border-radius:4px; overflow:hidden; }
.prog-fill { height:100%; border-radius:4px; background:linear-gradient(90deg, #534AB7, #AFA9EC); transition:width 0.4s cubic-bezier(0.34,1.56,0.64,1); }

.stats-row { display:flex; gap:8px; padding:8px 0; font-size:12px; font-family:'Saira Condensed',sans-serif; font-weight:700; flex-wrap:wrap; }
.stat-chip { padding:5px 12px; border-radius:10px; background:#fff; border:2px solid #F0E0D0; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
.stat-chip.green { color:#2E7D32; border-color:#A5D6A7; background:#F1F8E9; }
.stat-chip.red { color:#C62828; border-color:#FFCDD2; background:#FFF5F5; }
.stat-chip.blue { color:#534AB7; border-color:#AFA9EC; background:#EEEDFE; }

.q-card {
  background:#fff; border-radius:22px; border:2px solid #E8D8F0;
  padding:28px 22px; margin:10px 0 14px;
  box-shadow:0 8px 28px rgba(0,0,0,0.09);
  position:relative; overflow:hidden;
}
.q-accent { position:absolute; top:0; left:0; right:0; height:5px; border-radius:22px 22px 0 0; }
.kat-badge {
  display:inline-block; font-size:10px; font-weight:700; padding:4px 10px;
  border-radius:8px; margin-bottom:12px;
  font-family:'Saira Condensed',sans-serif; letter-spacing:0.5px;

.q-prompt { font-size:clamp(1.6rem, 7vw, 2.6rem); font-weight:900; line-height:1.35; color:#2D2520; margin-bottom:6px; }
.q-sub { font-size:13px; color:#AA8870; margin-bottom:16px; }
.q-num-label { font-size:11px; color:#CCC0B0; font-family:'Saira Condensed',sans-serif; margin-bottom:10px; }

.answer-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.hira-input {
  flex:1; min-width:160px; font-size:20px; padding:10px 14px;
  border-radius:12px; border:2px solid #E0D0F0;
  font-family:'Noto Sans JP', sans-serif; color:#2D2520;
  background:#FAFAFA; outline:none; transition:border-color 0.15s;

.hira-input:focus { border-color:#7F77DD; box-shadow:0 0 0 3px rgba(127,119,221,0.15); }
.hira-input.correct { border-color:#4CAF50; background:#F1F8E9; color:#2E7D32; }
.hira-input.wrong { border-color:#EF5350; background:#FFF5F5; color:#C62828; }

.check-btn {
  padding:10px 20px; border-radius:12px; font-size:14px;
  background:linear-gradient(135deg,#534AB7,#7F77DD); color:#fff;

.check-btn:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(83,74,183,0.4); }

.feedback {

.feedback.wrong { background:#FFF5F5; color:#C62828; border:2px solid #FFCDD2; display:block; }

.hint-btn {

  font-family:inherit; padding:0; display:none;

.nav-row { display:flex; gap:8px; justify-content:center; margin-bottom:8px; flex-wrap:wrap; }

.nav-btn.menu-btn { font-family:'Saira Condensed',sans-serif; font-size:12px; letter-spacing:1px; }

.result-msg { font-size:16px; color:#2D2520; margin-top:16px; line-height:1.5; }

.hidden { display:none !important; }

@keyframes slideIn { from { opacity:0.5; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

<div class="header">
  <div class="header-sub">介護日本語</div>
  <div class="header-title">SOAL ISIAN HIRAGANA</div>
  <div class="header-count" id="headerCount">263 kosakata • 10 kategori</div>
</div>

<div class="controls" id="menuArea">
  <div style="margin-bottom:12px">

    </div>
  </div>
  <div style="margin-bottom:14px">
    <div class="ctrl-label">Kategori</div>
    <div class="kat-chips" id="katChips"></div>
  </div>
  <button class="start-btn" id="startBtn" onclick="startQuiz()">MULAI SOAL (263 soal)</button>
</div>

<div class="quiz-wrap" id="quizArea">
  <div class="prog-area">
    <div class="prog-meta">
      <span id="cardCounter">1 / 263</span>
      <span class="benar-count" id="benarCounter">✓ 0 benar</span>
    </div>
    <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <div class="stats-row">
    <div class="stat-chip green" id="statBenar">✓ BENAR: 0</div>
    <div class="stat-chip red" id="statSalah">✗ SALAH: 0</div>
    <div class="stat-chip blue" id="statSisa">▸ SISA: 0</div>
  </div>

  <div class="q-card" id="qCard">
    <div class="q-accent" id="qAccent"></div>
    <div class="q-num-label" id="qNumLabel">Soal 1</div>
    <div class="kat-badge" id="qKatBadge">—</div>
    <div class="q-prompt" id="qPrompt">—</div>
    <div class="q-sub" id="qSub"></div>
    <div class="answer-row">
      <input class="hira-input" id="answerInput" placeholder="Tulis hiragana di sini..." autocomplete="off" spellcheck="false" />
      <button class="check-btn" onclick="checkAnswer()">Periksa</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="hint-btn" id="hintBtn" onclick="showHint()">Tampilkan jawaban</button>
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" onclick="goCard(-1)">← Prev</button>
    <button class="nav-btn shuffle-btn" onclick="shuffleAndRestart()">⇄ Acak Ulang</button>
    <button class="nav-btn" id="nextBtn" onclick="goCard(1)">Next →</button>
  </div>
  <div class="nav-row">
    <button class="nav-btn menu-btn" onclick="backToMenu()">← Menu</button>
  </div>
</div>

<div class="result-wrap" id="resultWrap">
  <div class="result-card">
    <div class="result-score" id="resultScore">0/0</div>
    <div class="result-pct" id="resultPct">0%</div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="result-restart" onclick="shuffleAndRestart()">ULANGI LAGI</button>
    <br><br>
    <button class="nav-btn menu-btn" onclick="backToMenu()" style="margin:0 auto;display:block">← Kembali ke Menu</button>
  </div>
</div>

let currentMode = 'kanji-hira';
let selectedKat = new Set(Object.keys(KAT_COLORS));

function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function normalize(s) { return (s||'').trim().replace(/\s+/g,'').toLowerCase(); }
function getQA(v) {
  if (currentMode==='kanji-hira') return { prompt: v.kanji, sub: v.arti, answer: v.reading };
  if (currentMode==='indo-hira') return { prompt: v.arti, sub: '', answer: v.reading };
  return { prompt: v.reading, sub: '', answer: v.arti };
}

function initChips() {
  const c = document.getElementById('katChips'); c.innerHTML='';
  Object.keys(KAT_COLORS).forEach(k => {
    const col = KAT_COLORS[k];
    const active = selectedKat.has(k);
    const count = ALL_VOCAB.filter(v=>v.kategori===k).length;
    const btn = document.createElement('button');
    btn.className='kat-chip';
    btn.style.borderColor = active ? col : '#DDD';
    btn.style.background = active ? col+'22' : 'transparent';
    btn.style.color = active ? col : '#999';
    btn.innerHTML = k + ' <span style="opacity:0.6;font-size:10px">'+count+'</span>';
    btn.onclick = () => {
      if (selectedKat.has(k)) { if(selectedKat.size>1) selectedKat.delete(k); }
      else selectedKat.add(k);
      initChips(); updateStartBtn();
    };
    c.appendChild(btn);
  });
}

function updateStartBtn() {
  const n = ALL_VOCAB.filter(v=>selectedKat.has(v.kategori)).length;
  document.getElementById('startBtn').textContent = 'MULAI SOAL (' + n + ' soal)';
}

function setMode(m, btn) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const pl = m==='hira-indo' ? 'Tulis arti dalam bahasa Indonesia...' : 'Tulis hiragana di sini...';
  document.getElementById('answerInput').placeholder = pl;
}

function startQuiz() {
  deck = shuffle(ALL_VOCAB.filter(v=>selectedKat.has(v.kategori)));
  currentIdx=0; benar=0; salah=0; checkedIdx.clear();
  document.getElementById('menuArea').classList.add('hidden');
  document.getElementById('quizArea').style.display='block';
  document.getElementById('resultWrap').style.display='none';
  renderCard();
}

function renderCard() {
  if (!deck.length) return;
  const v = deck[currentIdx];
  const { prompt, sub, answer } = getQA(v);
  const col = KAT_COLORS[v.kategori]||'#888';
  const total = deck.length;

  document.getElementById('qAccent').style.background = col;
  document.getElementById('qKatBadge').textContent = v.kategori;
  document.getElementById('qKatBadge').style.background = col+'22';
  document.getElementById('qKatBadge').style.color = col;
  document.getElementById('qNumLabel').textContent = 'Soal ' + (currentIdx+1);
  document.getElementById('qPrompt').textContent = prompt;
  document.getElementById('qSub').textContent = sub;

  const inp = document.getElementById('answerInput');
  inp.value=''; inp.className='hira-input'; inp.disabled=false;
  inp.placeholder = currentMode==='hira-indo' ? 'Tulis arti dalam bahasa Indonesia...' : 'Tulis hiragana di sini...';

  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').textContent='';
  document.getElementById('hintBtn').style.display='none';

  document.getElementById('cardCounter').textContent=(currentIdx+1)+' / '+total;
  document.getElementById('benarCounter').textContent='✓ '+benar+' benar';
  document.getElementById('progFill').style.width=Math.round((currentIdx+1)/total*100)+'%';
  document.getElementById('statBenar').textContent='✓ BENAR: '+benar;
  document.getElementById('statSalah').textContent='✗ SALAH: '+salah;
  document.getElementById('statSisa').textContent='▸ SISA: '+(total-currentIdx-1);
  document.getElementById('prevBtn').disabled = currentIdx===0;
  document.getElementById('nextBtn').disabled = currentIdx===deck.length-1;

  const qCard = document.getElementById('qCard');
  qCard.classList.remove('slide-in'); void qCard.offsetWidth; qCard.classList.add('slide-in');
  inp.focus();
}

function checkAnswer() {
  if (!deck.length) return;
  const v = deck[currentIdx];
  const { answer } = getQA(v);
  const inp = document.getElementById('answerInput');
  const userAns = normalize(inp.value);
  if (!userAns) return;

  const acceptable = answer.split('/').map(a=>normalize(a));
  const isOk = acceptable.some(a => userAns===a || userAns===a.replace(/\s/g,''));

  inp.disabled = true;
  const fb = document.getElementById('feedback');

  if (!checkedIdx.has(currentIdx)) {
    checkedIdx.add(currentIdx);
    if (isOk) benar++; else salah++;
  }

  if (isOk) {
    inp.className='hira-input correct';
    fb.className='feedback correct';
    fb.textContent='Benar! Jawaban: ' + answer;
  } else {
    inp.className='hira-input wrong';
    fb.className='feedback wrong';
    fb.textContent='Kurang tepat. Jawaban: ' + answer;
    document.getElementById('hintBtn').style.display='none';
  }
  document.getElementById('statBenar').textContent='✓ BENAR: '+benar;
  document.getElementById('statSalah').textContent='✗ SALAH: '+salah;
  document.getElementById('benarCounter').textContent='✓ '+benar+' benar';

  if (currentIdx===deck.length-1) setTimeout(showResult, 700);
}

function showHint() {
  const v = deck[currentIdx];
  document.getElementById('answerInput').value = getQA(v).answer;
}

function showResult() {
  document.getElementById('quizArea').style.display='none';
  const rw = document.getElementById('resultWrap'); rw.style.display='block';
  const pct = Math.round(benar/deck.length*100);
  document.getElementById('resultScore').textContent = benar+'/'+deck.length;
  document.getElementById('resultPct').textContent = pct+'%';
  const msg = pct===100?'Sempurna! Semua jawaban benar!':pct>=80?'Bagus sekali! Hampir sempurna!':pct>=50?'Lumayan! Terus semangat berlatih!':'Semangat! Coba ulangi lagi ya!';
  document.getElementById('resultMsg').textContent = msg;
}

function goCard(dir) {
  const n = currentIdx+dir;
  if (n<0||n>=deck.length) return;
  currentIdx=n; renderCard();
}

function shuffleAndRestart() {
  deck = shuffle(ALL_VOCAB.filter(v=>selectedKat.has(v.kategori)));
  currentIdx=0; benar=0; salah=0; checkedIdx.clear();
  document.getElementById('resultWrap').style.display='none';
  document.getElementById('quizArea').style.display='block';
  renderCard();
}

function backToMenu() {
  document.getElementById('quizArea').style.display='none';
  document.getElementById('resultWrap').style.display='none';
  document.getElementById('menuArea').classList.remove('hidden');
}

document.getElementById('answerInput').addEventListener('keydown', e => {
  if (e.key==='Enter') {
    const inp = document.getElementById('answerInput');
    if (inp.disabled) goCard(1); else checkAnswer();
  }
});

initChips(); updateStartBtn();
</script>
</body>
</html>
