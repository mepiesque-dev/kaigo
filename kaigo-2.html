  .menu-subtitle { color: #888; font-size: 13px; margin-top: 6px; text-align: center; }
  .section-label { font-size: 12px; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; font-family: 'Saira Condensed', sans-serif; }

    width: 100%; text-align: left; display: flex; align-items: center;
    gap: 10px; font-size: 15px; font-family: inherit; margin-bottom: 8px;
  }
  .btn-mode.active { border-color: #4fc3f7; background: #142233; color: #4fc3f7; }
  .btn-mode:hover { border-color: #555; }
  .btn-mode .check { margin-left: auto; font-size: 18px; display: none; }
  .btn-mode.active .check { display: inline; }

  .kat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .kat-actions { display: flex; gap: 8px; align-items: center; }
  .kat-link { background: none; border: none; font-size: 11px; cursor: pointer; padding: 0; font-family: inherit; }
  .kat-link.blue { color: #4fc3f7; }
  .kat-link.grey { color: #888; }
  .kat-sep { color: #444; }

  .kat-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 99px; font-size: 12px;
    cursor: pointer; border: 1.5px solid; transition: all 0.15s;
    font-family: inherit; margin: 3px; background: transparent;
  }
  .kat-count-text { margin-top: 8px; font-size: 12px; color: #666; }

  .furi-toggle-row {
    background: #1a1d27; border-radius: 12px; padding: 12px 16px;
    margin-bottom: 4px; display: flex; align-items: center; gap: 10px;
  }
  .furi-icon { font-size: 20px; }
  .furi-label { flex: 1; font-size: 13px; color: #aaa; }
  .toggle-track {
    width: 44px; height: 24px; border-radius: 12px; background: #333;
    cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0;
  }
  .toggle-track.on { background: #4fc3f7; }
  .toggle-thumb {
    width: 20px; height: 20px; border-radius: 50%; background: #fff;
    position: absolute; top: 2px; left: 2px; transition: left 0.2s;
  }
  .toggle-track.on .toggle-thumb { left: 22px; }

  .start-btn {
    background: linear-gradient(135deg, #4fc3f7, #0288d1); color: #000;
    border: none; border-radius: 14px; padding: 16px 0; font-size: 18px;
    font-weight: 900; font-family: 'Saira Condensed', sans-serif;
    letter-spacing: 1px; cursor: pointer; width: 100%; margin-top: 24px;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .back-arrow { background: none; border: none; color: #888; cursor: pointer; font-size: 22px; padding: 0; font-family: inherit; }
  .quiz-counter { font-family: 'Saira Condensed', sans-serif; font-size: 20px; font-weight: 700; color: #4fc3f7; }
  .quiz-counter span { color: #444; }
  .quiz-score { font-family: 'Saira Condensed', sans-serif; font-size: 16px; color: #4caf50; }
  .progress-bar { height: 4px; background: #1e2130; border-radius: 2px; margin-bottom: 16px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  .quiz-card { flex: 1; padding: 0 16px 24px; max-width: 480px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 16px; }
  .kategori-badge { display: inline-flex; align-self: flex-start; border-radius: 8px; padding: 3px 10px; font-size: 12px; font-weight: 700; }
  .question-box { background: #1a1d27; border-radius: 20px; padding: 24px 20px; text-align: center; }
  .question-type { font-size: 12px; color: #888; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; font-family: 'Saira Condensed', sans-serif; }
  .question-prompt { font-weight: 900; line-height: 1.3; }
  .question-furigana { font-size: 14px; color: #aaa; margin-top: 4px; }

  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    background: #1a1d27; border: 2px solid #252836; border-radius: 14px;
    color: #e0e0e0; padding: 14px 16px; cursor: pointer; width: 100%;
    text-align: left; font-size: 14px; font-family: inherit; transition: all 0.15s;
    line-height: 1.4; display: flex; align-items: center; gap: 10px;

  .opt-btn:hover:not(:disabled) { border-color: #4fc3f7; }
  .opt-btn.correct { border-color: #4caf50; background: #0d2b1d; color: #4caf50; }
  .opt-btn.wrong { border-color: #f44336; background: #2b0d0d; color: #f44336; }
  .opt-prefix {
    min-width: 28px; height: 28px; border-radius: 8px; background: #252836;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #aaa;
    font-family: 'Saira Condensed', sans-serif; flex-shrink: 0;
  }
  .opt-btn.correct .opt-prefix { background: #4caf50; color: #fff; }
  .opt-btn.wrong .opt-prefix { background: #f44336; color: #fff; }

  .feedback-box { border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .feedback-box.correct { background: #0d2b1d; }
  .feedback-box.wrong { background: #2b0d0d; }
  .feedback-emoji { font-size: 24px; }
  .feedback-title { font-weight: 700; font-size: 14px; }
  .feedback-title.correct { color: #4caf50; }
  .feedback-title.wrong { color: #f44336; }
  .feedback-answer { font-size: 13px; color: #aaa; margin-top: 2px; }
  .feedback-answer strong { color: #4caf50; }
  .feedback-reading { font-size: 12px; color: #888; margin-top: 2px; }

  .next-btn {
    background: linear-gradient(135deg, #4fc3f7, #0288d1); color: #000;
    border: none; border-radius: 14px; padding: 16px 0; font-size: 17px;
    font-weight: 900; font-family: 'Saira Condensed', sans-serif;
    letter-spacing: 1px; cursor: pointer; width: 100%;
  }

  .result-score span { color: #555; }
  .result-pct { color: #888; font-size: 14px; margin-top: 4px; }
  .recap-box { background: #1a1d27; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
  .recap-label { font-size: 12px; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; font-family: 'Saira Condensed', sans-serif; }

  .res-furigana { font-size: 11px; color: #888; }

  .res-chosen.wrong-ans { color: #f44336; }

    color: #ccc; padding: 14px 0; font-size: 15px; cursor: pointer;
    width: 100%; font-family: inherit; margin-top: 12px;

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- MENU SCREEN -->
<div id="screen-menu">
  <div class="menu-inner">
    <div class="menu-title-sub">介護日本語</div>
    <h1 class="menu-title">KAIGO QUIZ</h1>
    <p class="menu-subtitle" id="vocab-count-text"></p>

    <div class="section-block" style="margin-top:28px">
      <div class="section-label">Mode Soal</div>

      <div class="kat-header">
        <div class="section-label" style="margin-bottom:0">Kategori</div>
        <div class="kat-actions">
          <button class="kat-link blue" onclick="selectAllKategori()">Semua</button>
          <span class="kat-sep">|</span>
          <button class="kat-link grey" onclick="resetKategori()">Reset</button>
        </div>
      </div>
      <div id="kat-chips"></div>
      <div class="kat-count-text" id="kat-count"></div>
    </div>

    <div class="furi-toggle-row">
      <span class="furi-icon">ふ</span>
      <span class="furi-label">Tampilkan furigana saat soal</span>
      <div class="toggle-track on" id="furi-toggle" onclick="toggleFuri()">
        <div class="toggle-thumb"></div>
      </div>
    </div>

    <button class="start-btn" id="start-btn" onclick="startQuiz()">MULAI KUIS</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz" class="hidden">
  <div class="quiz-header">
    <div class="quiz-header-row">
      <button class="back-arrow" onclick="goToMenu()">←</button>
      <div class="quiz-counter" id="quiz-counter">1 <span>/ 0</span></div>
      <div class="quiz-score" id="quiz-score">✓ 0</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="quiz-card slide-in" id="quiz-card">
    <div class="kategori-badge" id="kat-badge"></div>
    <div class="question-box" id="question-box">
      <div class="question-type" id="question-type"></div>
      <div class="question-prompt" id="question-prompt"></div>
      <div class="question-furigana hidden" id="question-furigana"></div>
    </div>
    <div class="options-list" id="options-list"></div>
    <div id="feedback-area" class="hidden slide-in"></div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="screen-result" class="hidden">
  <div class="result-inner">
    <div class="result-header">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <div class="result-score" id="result-score">0<span>/0</span></div>
      <div class="result-pct" id="result-pct">0% benar</div>
    </div>
    <div class="recap-box">
      <div class="recap-label">Rekap Jawaban</div>
      <div id="recap-list"></div>
    </div>
    <button class="retry-btn" onclick="retryQuiz()">ULANGI KUIS</button>
    <button class="back-btn" onclick="goToMenu()">← Kembali ke Menu</button>
  </div>
</div>

  { kanji: "パジャマ", reading: "ぱじゃま", arti: "piyama", kategori: "Kerja & Fasilitas" },
  { kanji: "呼び出しボタン", reading: "よびだしぼたん", arti: "tombol panggil", kategori: "Kerja & Fasilitas" },
  { kanji: "確認", reading: "かくにん", arti: "memeriksa, memastikan", kategori: "Kerja & Fasilitas" },
];

const KATEGORI_WARNA = {
  "Bagian Tubuh": "#e74c3c",
  "Makanan & Minuman": "#e67e22",
  "Perawatan Makan": "#f39c12",
  "Berpindah & Posisi": "#27ae60",
  "Penyakit & Gejala": "#8e44ad",
  "Buang Air (Toilet)": "#2980b9",
  "Kebersihan Diri": "#16a085",
  "Mandi & Kebersihan": "#1abc9c",
  "Urusan Rumah": "#d35400",
  "Kerja & Fasilitas": "#2c3e50",
};

const MODES = [
  { id: "kanji-to-arti", label: "Kanji → Arti", icon: "🇯🇵→🇮🇩" },
  { id: "arti-to-kanji", label: "Arti → Kanji", icon: "🇮🇩→🇯🇵" },
  { id: "kanji-to-reading", label: "Kanji → Furigana", icon: "漢→ふ" },
];

const SEMUA_KATEGORI = [...new Set(ALL_VOCAB.map(v => v.kategori))];

// State
let currentMode = "kanji-to-arti";
let selectedKategori = new Set(SEMUA_KATEGORI);
let showFuri = true;
let questions = [];
let currentIdx = 0;
let selected = null;
let score = 0;
let answers = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getWrongOptions(correct, pool, field, count = 3) {
  const wrongs = pool.filter(v => v[field] !== correct[field]).map(v => v[field]);
  return shuffle([...new Set(wrongs)]).slice(0, count);
}

function generateQuestion(vocab, allVocab, mode) {
  if (mode === "kanji-to-arti") {
    const correct = vocab.arti;
    const wrongs = getWrongOptions(vocab, allVocab, "arti");
    return { prompt: vocab.kanji, furigana: vocab.reading, type: "Artinya?", options: shuffle([correct, ...wrongs]), correct };
  } else if (mode === "arti-to-kanji") {
    const correct = vocab.kanji;
    const wrongs = getWrongOptions(vocab, allVocab, "kanji");
    return { prompt: vocab.arti, furigana: null, type: "Kata Jepangnya?", options: shuffle([correct, ...wrongs]), correct, correctReading: vocab.reading };
  } else {
    const correct = vocab.reading;
    const wrongs = getWrongOptions(vocab, allVocab, "reading");
    return { prompt: vocab.kanji, furigana: null, type: "Cara bacanya?", options: shuffle([correct, ...wrongs]), correct };
  }
}

function getFilteredVocab() {
  return ALL_VOCAB.filter(v => selectedKategori.has(v.kategori));
}

function showScreen(name) {
  document.getElementById('screen-menu').classList.toggle('hidden', name !== 'menu');
  document.getElementById('screen-quiz').classList.toggle('hidden', name !== 'quiz');
  document.getElementById('screen-result').classList.toggle('hidden', name !== 'result');
}

function goToMenu() { showScreen('menu'); renderMenu(); }

function toggleFuri() {
  showFuri = !showFuri;
  const t = document.getElementById('furi-toggle');
  t.classList.toggle('on', showFuri);
}

function selectAllKategori() {
  selectedKategori = new Set(SEMUA_KATEGORI);
  renderKatChips();
  updateKatCount();
}

function resetKategori() {
  selectedKategori = new Set([SEMUA_KATEGORI[0]]);
  renderKatChips();
  updateKatCount();
}

function toggleKategori(k) {
  if (selectedKategori.has(k)) {
    if (selectedKategori.size > 1) selectedKategori.delete(k);
  } else {
    selectedKategori.add(k);
  }
  renderKatChips();
  updateKatCount();
}

function updateKatCount() {
  const fv = getFilteredVocab();
  document.getElementById('kat-count').textContent = fv.length + ' kata dipilih';
  const btn = document.getElementById('start-btn');
  btn.textContent = 'MULAI KUIS (' + fv.length + ' soal)';
  btn.disabled = fv.length < 4;
}

function renderKatChips() {
  const container = document.getElementById('kat-chips');
  container.innerHTML = '';
  SEMUA_KATEGORI.forEach(k => {
    const active = selectedKategori.has(k);
    const col = KATEGORI_WARNA[k];
    const count = ALL_VOCAB.filter(v => v.kategori === k).length;
    const btn = document.createElement('button');
    btn.className = 'kat-chip';
    btn.style.borderColor = active ? col : '#2a2d3a';
    btn.style.background = active ? col + '22' : 'transparent';
    btn.style.color = active ? col : '#666';
    btn.innerHTML = '<span>' + k + '</span><span style="opacity:0.7;font-size:11px">' + count + '</span>';
    btn.onclick = () => toggleKategori(k);
    container.appendChild(btn);
  });
}

function renderMenu() {
  document.getElementById('vocab-count-text').textContent = ALL_VOCAB.length + ' kosakata • ' + SEMUA_KATEGORI.length + ' kategori';
  const modeList = document.getElementById('mode-list');
  modeList.innerHTML = '';
  MODES.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'btn-mode' + (currentMode === m.id ? ' active' : '');
    btn.innerHTML = '<span style="font-size:18px;min-width:36px;text-align:center">' + m.icon + '</span><span>' + m.label + '</span><span class="check">✓</span>';
    btn.onclick = () => {
      currentMode = m.id;
      document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    modeList.appendChild(btn);
  });
  renderKatChips();
  updateKatCount();
  const t = document.getElementById('furi-toggle');
  t.classList.toggle('on', showFuri);
}

function startQuiz() {
  const filtered = getFilteredVocab();
  if (filtered.length < 4) return;
  const pool = shuffle(filtered);
  questions = pool.map(v => ({ ...generateQuestion(v, filtered, currentMode), kategori: v.kategori, vocab: v }));
  currentIdx = 0;
  selected = null;
  score = 0;
  answers = [];
  showScreen('quiz');
  renderQuiz();
}

function renderQuiz() {
  if (!questions[currentIdx]) return;
  const q = questions[currentIdx];
  const col = KATEGORI_WARNA[q.kategori] || '#4fc3f7';
  const progress = ((currentIdx) / questions.length) * 100;

  document.getElementById('quiz-counter').innerHTML = (currentIdx + 1) + ' <span>/ ' + questions.length + '</span>';
  document.getElementById('quiz-score').textContent = '✓ ' + score;
  document.getElementById('progress-fill').style.width = progress + '%';
  document.getElementById('progress-fill').style.background = 'linear-gradient(90deg, ' + col + ', #4fc3f7)';

  const badge = document.getElementById('kat-badge');
  badge.textContent = q.kategori;
  badge.style.background = col + '22';
  badge.style.color = col;

  document.getElementById('question-box').style.border = '1px solid ' + col + '33';
  document.getElementById('question-type').textContent = q.type;
  const promptEl = document.getElementById('question-prompt');
  promptEl.textContent = q.prompt;
  promptEl.style.fontSize = q.prompt.length > 8 ? '22px' : '36px';

  const furiEl = document.getElementById('question-furigana');
  if (q.furigana && showFuri) {
    furiEl.textContent = q.furigana;
    furiEl.classList.remove('hidden');
  } else {
    furiEl.classList.add('hidden');
  }

  const optList = document.getElementById('options-list');
  optList.innerHTML = '';
  const HIRAGANA = ["あ", "い", "う", "え"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = '<span class="opt-prefix">' + (HIRAGANA[i] || (i+1)) + '</span><span>' + opt + '</span>';
    btn.onclick = () => handleSelect(opt);
    optList.appendChild(btn);
  });

  document.getElementById('feedback-area').classList.add('hidden');
  document.getElementById('feedback-area').innerHTML = '';

  const card = document.getElementById('quiz-card');
  card.classList.remove('slide-in');
  void card.offsetWidth;
  card.classList.add('slide-in');
}

function handleSelect(opt) {
  if (selected !== null) return;
  selected = opt;
  const q = questions[currentIdx];
  const isCorrect = opt === q.correct;
  if (isCorrect) score++;
  answers.push({ ...q, chosen: opt, correct: isCorrect });

  document.getElementById('quiz-score').textContent = '✓ ' + score;

  const KATAKANA = ["ア", "イ", "ウ", "エ"];
  const optBtns = document.querySelectorAll('.opt-btn');
  optBtns.forEach((btn, i) => {
    const btnOpt = q.options[i];
    btn.onclick = null;
    if (btnOpt === q.correct) {
      btn.classList.add('correct');
      btn.querySelector('.opt-prefix').style.background = '#4caf50';
      btn.querySelector('.opt-prefix').style.color = '#fff';
    } else if (btnOpt === opt && !isCorrect) {
      btn.classList.add('wrong');
      btn.querySelector('.opt-prefix').style.background = '#f44336';
      btn.querySelector('.opt-prefix').style.color = '#fff';
    }
  });

  const feedbackArea = document.getElementById('feedback-area');
  let feedbackHTML = '<div class="feedback-box ' + (isCorrect ? 'correct' : 'wrong') + '">'
    + '<span class="feedback-emoji">' + (isCorrect ? '✅' : '❌') + '</span>'
    + '<div>'
    + '<div class="feedback-title ' + (isCorrect ? 'correct' : 'wrong') + '">' + (isCorrect ? 'Benar!' : 'Salah!') + '</div>';
  if (!isCorrect) {
    feedbackHTML += '<div class="feedback-answer">Jawaban: <strong>' + q.correct + '</strong></div>';
  }
  if (q.correctReading) {
    feedbackHTML += '<div class="feedback-reading">(' + q.correctReading + ')</div>';
  }
  feedbackHTML += '</div></div>';
  feedbackHTML += '<button class="next-btn" onclick="nextQuestion()">'
    + (currentIdx + 1 >= questions.length ? 'LIHAT HASIL →' : 'LANJUT →') + '</button>';
  feedbackArea.innerHTML = feedbackHTML;
  feedbackArea.classList.remove('hidden');
}

function nextQuestion() {
  if (currentIdx + 1 >= questions.length) {
    showResult();
  } else {
    currentIdx++;
    selected = null;
    renderQuiz();
  }
}

function showResult() {
  showScreen('result');
  const pct = Math.round(score / questions.length * 100);
  const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '😊' : '💪';
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-score').innerHTML = score + '<span>/' + questions.length + '</span>';
  document.getElementById('result-pct').textContent = pct + '% benar';

  const recap = document.getElementById('recap-list');
  recap.innerHTML = '';
  answers.forEach(a => {
    const col = KATEGORI_WARNA[a.kategori] || '#4fc3f7';
    const row = document.createElement('div');
    row.className = 'res-row';
    let html = '<div class="res-row-inner"><div class="res-left">'
      + '<div><span class="res-kat-badge" style="background:' + col + '33;color:' + col + '">' + a.kategori + '</span></div>'
      + '<div class="res-prompt">' + a.prompt + '</div>';
    if (a.furigana && showFuri) html += '<div class="res-furigana">' + a.furigana + '</div>';
    html += '<div class="res-chosen ' + (a.correct ? 'correct-ans' : 'wrong-ans') + '">'
      + (a.correct ? '✓' : '✗') + ' ' + a.chosen + '</div>';
    if (!a.correct) {
      const correctVal = typeof a.correct === 'boolean' ? a.chosen : questions.find(q => q.prompt === a.prompt && q.correct === a.chosen)?.correct || '';
      html += '<div class="res-correct-ans">→ ' + a.chosen + '</div>';
    }
    html += '</div><div class="res-emoji">' + (a.correct ? '✅' : '❌') + '</div></div>';
    row.innerHTML = html;
    recap.appendChild(row);
  });
}

function retryQuiz() {
  startQuiz();
}

// Init
renderMenu();
showScreen('menu');
</script>
</body>
</html>
